# SendSprint — Codex CLI config snippet
# Append this to .codex/config.toml (or ~/.codex/config.toml).
# Keep in sync with the plugin's AGENTS.md.

[sandbox]
mode = "workspace-write"

[approval]
policy = "safe_commands"

[history]
max_entries = 0

# Enable /goal long-running loops — SendSprint flow runs cleanly under /goal.
[features]
goals = true

# Commands SendSprint and friends can run without prompting.
[shell]
safe_commands = [
  "sendsprint version",
  "sendsprint doctor",
  "sendsprint detect-tech",
  "sendsprint read-jira",
  "sendsprint read-ado",
  "sendsprint check-architecture",
  "sendsprint preflight",
  "sendsprint sprint",
  "sendsprint run",
  "sendsprint watch",
  "sendsprint web",
  "sendsprint catalog",
  "git status",
  "git diff",
  "git log",
  "pytest tests",
  "ruff check sendsprint",
  "ruff format sendsprint",
  "playwright install --with-deps chromium",
]
