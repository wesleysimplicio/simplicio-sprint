name: publish

# Publish SendSprint to PyPI via Trusted Publishing (OIDC) — no API token in the
# repo. Triggers when you publish a GitHub Release (recommended) or manually.
#
# One-time setup on PyPI (project "sendsprint" → Settings → Publishing → Add a
# new pending/trusted publisher):
#   - Owner:        wesleysimplicio
#   - Repository:   simplicio-sprint
#   - Workflow:     publish.yml
#   - Environment:  pypi
# Then bump the version, create a GitHub Release with tag vX.Y.Z, and this runs.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
