name: Sync Agentic Starter

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "agentic-starter source: local path, GitHub URL, or owner/repo"
        default: "https://github.com/wesleysimplicio/agentic-starter"
        required: false
      ref:
        description: "'latest', tag, branch, or SHA"
        default: "latest"
        required: false
      force:
        description: "Overwrite existing scaffold files"
        type: boolean
        default: false
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SendSprint
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Sync scaffold
        run: |
          SOURCE="${{ github.event.inputs.source || 'https://github.com/wesleysimplicio/agentic-starter' }}"
          REF="${{ github.event.inputs.ref || 'latest' }}"
          FORCE=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE="--force"
          fi
          sendsprint sync-agentic-starter . --source "$SOURCE" --ref "$REF" $FORCE

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: codex/sync-agentic-starter
          delete-branch: true
          title: "chore: sync agentic-starter scaffold"
          commit-message: "chore: sync agentic-starter scaffold"
          body: |
            Automated sync from the configured agentic-starter source.

            Review carefully before merging because scaffold files may affect agent behavior.
