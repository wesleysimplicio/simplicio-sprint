# DoD gate — valida Definition of Done em todo PR antes do merge.
# Adaptado para SendSprint (Python 3.11+): pytest + ruff + coverage >= 80%
# + checagem de referência a task + ADR linkado quando architecture/ muda.

name: DoD Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches:
      - main
      - master

concurrency:
  group: dod-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  dod-check:
    name: Definition of Done
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project (editable + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check sendsprint/

      - name: Format check (ruff format --check)
        run: ruff format --check sendsprint/

      - name: Run unit tests with coverage
        run: |
          mkdir -p test-results
          pytest tests/ -v \
            --cov=sendsprint \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results/junit.xml

      - name: Check coverage threshold (>=80%)
        run: |
          set -euo pipefail
          if [ ! -f coverage.xml ]; then
            echo "::error::coverage.xml não encontrado. pytest-cov não rodou."
            exit 1
          fi
          PCT=$(python -c "import xml.etree.ElementTree as ET; \
            r = ET.parse('coverage.xml').getroot(); \
            print(round(float(r.attrib['line-rate']) * 100, 2))")
          echo "Coverage de linhas: ${PCT}%"
          python -c "import sys; sys.exit(0 if float('${PCT}') >= 80 else 1)" \
            || { echo "::error::Coverage abaixo de 80% (atual: ${PCT}%)"; exit 1; }

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            test-results/junit.xml
          retention-days: 7

      - name: Validate PR title (conventional commit)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          if ! echo "$PR_TITLE" | grep -Eq '^(feat|fix|chore|docs|refactor|test|perf|style|ci|build|revert)(\([^)]+\))?(!)?:[[:space:]].+'; then
            echo "::error::Título do PR não segue Conventional Commits (ex: 'feat: ...', 'fix(auth): ...', 'chore!: ...')."
            exit 1
          fi

      - name: Check task reference in PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          if [ -z "${PR_BODY:-}" ]; then
            echo "::error::PR body vazio. Inclua referência à task (ex: 'Closes #42' ou link para .specs/sprints/.../<id>.task.md)."
            exit 1
          fi
          if ! echo "$PR_BODY" | grep -Eq '(#[0-9]+|task-?[0-9]+\.md|\.specs/sprints/.+\.task\.md)'; then
            echo "::error::PR body deve referenciar uma task (#NNN, task-NNN.md ou link em .specs/sprints/)."
            exit 1
          fi

      - name: Require ADR link when architecture changes
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)
          if echo "$CHANGED" | grep -Eq '^\.specs/architecture/|^architecture/'; then
            echo "Mudanças detectadas em architecture/. Verificando ADR linkado..."
            if ! echo "${PR_BODY:-}" | grep -Eq '(ADR-[0-9]+|adr-[0-9]+)'; then
              echo "::error::Mudanças em architecture/ exigem ADR linkado no PR body (ex: ADR-001, ADR-042)."
              exit 1
            fi
          fi

      - name: Require CHANGELOG when version bumps
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)
          if echo "$CHANGED" | grep -Eq '^pyproject\.toml$|sendsprint/__init__\.py$'; then
            if ! echo "$CHANGED" | grep -Eq '^CHANGELOG\.md$'; then
              echo "::error::Bump de versão (pyproject.toml ou __init__.py) exige entrada em CHANGELOG.md."
              exit 1
            fi
          fi
