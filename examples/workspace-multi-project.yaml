# SendSprint multi-project workspace example
# Flat repos can coexist with project-owned repos during migration.

name: portfolio-workspace
root_path: .

repos:
  - name: shared-lib
    path: packages/shared-lib
    project: platform
    role: lib
    capabilities:
      - shared-contracts
    owners:
      - platform-team
    validation_commands:
      - pytest packages/shared-lib/tests -q

projects:
  - key: checkout
    name: Checkout
    owners:
      - checkout-team
    capabilities:
      - checkout
      - cart
    components:
      - checkout-api
      - storefront
    routing_hints:
      labels:
        - checkout
      components:
        - checkout-api
        - storefront
    branch_pattern: feature/checkout/{number}-{title}
    commit_pattern: "feat(checkout): {title}"
    repos:
      - name: checkout-api
        path: services/checkout-api
        role: api
        tech: python
        components:
          - api
        owners:
          - checkout-api-owner@example.com
        routing_hints:
          labels:
            - scope:back
        validation_commands:
          - ruff check sendsprint
          - pytest tests/checkout -q

      - name: storefront-web
        path: apps/storefront-web
        role: front
        tech: react
        components:
          - ui
        owners:
          - storefront-owner@example.com
        routing_hints:
          labels:
            - scope:front
          paths:
            - apps/storefront-web/**
        validation_commands:
          - npm test
          - npx playwright test

  - key: admin
    name: Admin
    owners:
      - admin-team
    capabilities:
      - backoffice
    repos:
      - name: admin-web
        path: apps/admin-web
        role: front
        tech: angular
        branch_pattern: feature/admin/{number}-{title}
        commit_pattern: "fix(admin): {title}"
        validation_commands:
          - npm test -- --run
          - npx playwright test

