# SendSprint single-project workspace example
# Project repos are flattened into WorkspaceConfig.repos for existing flows.

name: commerce-workspace
root_path: .

portfolio:
  name: Commerce
  owners:
    - platform-office
  capabilities:
    - checkout
    - payments

projects:
  - key: payments
    name: Payments
    owners:
      - team-payments
    capabilities:
      - payment-processing
    components:
      - checkout
      - ledger
    routing_hints:
      labels:
        - payments
      areas:
        - Checkout
    branch_pattern: feature/payments/{number}-{title}
    commit_pattern: "feat(payments): {title}"
    validation_commands:
      - pytest tests/payments -q
    repos:
      - name: checkout-web
        path: apps/checkout-web
        role: front
        tech: react
        frontend:
          base_url: http://localhost:5173
          dev_server_command: npm run dev -- --host 127.0.0.1 --port 5173
          flow_inventory: auto
          generate_route_smokes: true
          screenshot_evidence: true
        routing_hints:
          labels:
            - scope:front
          paths:
            - apps/checkout-web/**
        validation_commands:
          - npm test
          - npx playwright test

      - name: payments-api
        path: apps/payments-api
        role: api
        tech: python
        capabilities:
          - capture
          - refund
        components:
          - api
          - worker
        owners:
          - api-owner@example.com
        routing_hints:
          labels:
            - scope:back
          paths:
            - apps/payments-api/**
        branch_pattern: feature/pay-api/{number}-{title}
        commit_pattern: "fix(payments-api): {title}"
        validation_commands:
          - ruff check sendsprint
          - pytest tests -q
        lint_command: ruff check sendsprint
        test_command: pytest tests -q
